<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영단어 시험장 - 인증 Portal</title>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* 커스텀 토스트 알림창 디자인 (LAGO PRO 미니멀 아키텍처) */
        .toast-container {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(139, 50, 255, 0.15);
            padding: 16px 28px;
            border-radius: 16px;
            box-shadow: 0 16px 32px rgba(139, 50, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 10000;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            backdrop-filter: blur(8px);
        }
        .toast-container.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast-icon {
            font-size: 1.2rem;
        }
        .toast-message {
            font-size: 0.95rem;
            font-weight: 600;
            color: #1E2229;
        }

        /* 폼 하단 고정 에러 알림 영역 */
        .inline-error-card {
            background: #FFF5F5;
            border: 1px solid #FFE3E3;
            padding: 12px 16px;
            border-radius: 12px;
            color: #FF4A4A;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 14px;
            display: none;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <!-- ★ 새로 내장화된 시스템 토스트 팝업창 -->
    <div class="toast-container" id="custom-toast">
        <span class="toast-icon" id="toast-icon-target">🔑</span>
        <span class="toast-message" id="toast-msg-target">환영합니다!</span>
    </div>

    <div class="auth-wrapper">
        <div class="auth-portal">
            <div class="auth-logo-area">
                <div class="auth-logo-box"><span>📖</span></div>
            </div>
            
            <h1 id="portal-title">영단어 시험장</h1>
            <p class="subtitle" id="portal-subtitle">아이디와 쉬운 비밀번호로 로그인하거나 가입하세요</p>
            
            <div class="tab-segment">
                <button id="tab-login" class="tab-btn active" onclick="switchMode('login')">로그인</button>
                <button id="tab-register" class="tab-btn" onclick="switchMode('register')">회원가입</button>
            </div>
            
            <form id="auth-form" onsubmit="handleSubmit(event)">
                <div class="form-field">
                    <label for="user-id">아이디</label>
                    <input type="text" id="user-id" class="input-control" placeholder="예: lago" required autocomplete="username">
                </div>
                
                <div class="form-field">
                    <label for="user-password">비밀번호</label>
                    <input type="password" id="user-password" class="input-control" placeholder="예: 1234" required autocomplete="current-password">
                </div>
                
                <!-- 인라인 경고창 영역 -->
                <div class="inline-error-card" id="error-box">
                    <span>⚠️</span> <span id="error-msg-text">오류가 발생했습니다.</span>
                </div>
                
                <button type="submit" id="btn-submit-text" class="btn-submit" style="margin-top: 16px;">로그인</button>
            </form>
            
            <div class="sub-actions-grid">
                <div class="btn-sub-outline" onclick="showInlineError('대결 모드를 내부 준비 중입니다!')" style="cursor: pointer;">⚔️ 대결 보기</div>
                <div class="btn-sub-outline" onclick="showInlineError('랭킹 시스템을 내부 준비 중입니다!')" style="cursor: pointer;">🏆 랭킹 보기</div>
            </div>
        </div>
    </div>

    <script>
        const DB_BASE_URL = "https://fir-2-f3b80-default-rtdb.asia-southeast1.firebasedatabase.app";
        let currentMode = 'login';

        /* 토스트 호출 유틸리티 */
        function triggerToast(icon, message, callback) {
            const toast = document.getElementById('custom-toast');
            document.getElementById('toast-icon-target').innerText = icon;
            document.getElementById('toast-msg-target').innerText = message;
            
            toast.classList.add('active');
            
            setTimeout(() => {
                toast.classList.remove('active');
                if(callback) callback();
            }, 1800);
        }

        /* 인라인 에러 박스 호출 유틸리티 */
        function showInlineError(message) {
            const errorBox = document.getElementById('error-box');
            document.getElementById('error-msg-text').innerText = message;
            errorBox.style.display = 'flex';
        }

        function clearInlineError() {
            document.getElementById('error-box').style.display = 'none';
        }

        function switchMode(mode) {
            currentMode = mode;
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            const btnSubmit = document.getElementById('btn-submit-text');
            const portalSubtitle = document.getElementById('portal-subtitle');
            clearInlineError();

            if (mode === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                btnSubmit.innerText = '로그인';
                portalSubtitle.innerText = '아이디와 쉬운 비밀번호로 로그인하거나 가입하세요';
            } else {
                tabLogin.classList.remove('active');
                tabRegister.classList.add('active');
                btnSubmit.innerText = '회원가입 완료 및 등록';
                portalSubtitle.innerText = '새로운 계정에 사용할 아이디와 비밀번호를 입력하세요';
            }
            document.getElementById('auth-form').reset();
        }

        async function handleSubmit(event) {
            event.preventDefault();
            clearInlineError();
            
            const userId = document.getElementById('user-id').value.trim();
            const userPw = document.getElementById('user-password').value;

            if(!/^[a-zA-Z0-9_]+$/.test(userId)) {
                showInlineError("아이디는 영문, 숫자, 언더바(_)만 허용됩니다.");
                return;
            }

            if (currentMode === 'register') {
                await processRegister(userId, userPw);
            } else {
                await processLogin(userId, userPw);
            }
        }

        async function processRegister(id, password) {
            try {
                const checkRes = await fetch(`${DB_BASE_URL}/users/${id}.json`);
                const existingUser = await checkRes.json();

                if (existingUser !== null) {
                    showInlineError("이미 존재하는 아이디입니다. 다른 아이디를 입력하세요.");
                    return;
                }

                const userData = { password: password, createdAt: new Date().toISOString() };
                const saveRes = await fetch(`${DB_BASE_URL}/users/${id}.json`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                if (saveRes.ok) {
                    sessionStorage.setItem('isLoggedIn', 'true');
                    sessionStorage.setItem('currentUserId', id);
                    
                    // 브라우저 얼럿 대신 부드러운 내장 토스트 후 메인 이동
                    triggerToast("🎉", `가입 완료! ${id}님 환영합니다.`, () => {
                        window.location.href = '../main/index.html';
                    });
                }
            } catch (error) {
                showInlineError("네트워크 통신 중 에러가 발생했습니다.");
            }
        }

        async function processLogin(id, password) {
            try {
                const res = await fetch(`${DB_BASE_URL}/users/${id}.json`);
                const userData = await res.json();

                if (userData === null || userData.password !== password) {
                    showInlineError("아이디 또는 비밀번호가 일치하지 않습니다.");
                    return;
                }

                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('currentUserId', id);
                
                // image_1a9d08.png 의 얼럿창을 완벽히 대체하는 커스텀 토스트 연출
                triggerToast("🔑", `${id}님 반가워요! 단어장으로 이동합니다.`, () => {
                    window.location.href = '../main/index.html';
                });
            } catch (error) {
                showInlineError("로그인 데이터베이스 연동에 실패했습니다.");
            }
        }
    </script>
</body>
</html>
