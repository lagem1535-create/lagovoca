<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAGO VOCA - 스마트 영단어 시험장</title>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="./css/style.css">
    <style>
        .promo-hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #FFFFFF;
            padding: 24px;
        }
        .promo-title {
            font-size: 2.8rem;
            font-weight: 800;
            color: #1E2229;
            margin-bottom: 16px;
            letter-spacing: -1px;
        }
        .promo-title span { color: #8B32FF; }
        .promo-desc {
            font-size: 1.2rem;
            color: #8A94A6;
            margin-bottom: 36px;
            line-height: 1.6;
        }
        .btn-promo-start {
            padding: 16px 32px;
            background: #8B32FF;
            color: #FFFFFF;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 14px;
            text-decoration: none;
            box-shadow: 0 8px 24px rgba(139, 50, 255, 0.15);
            transition: all 0.2s ease;
        }
        .btn-promo-start:hover {
            background: #7212FF;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="promo-hero">
        <div class="auth-logo-box" style="margin-bottom: 24px; width: 64px; height: 64px; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; background: #F1F3F7; border-radius: 16px;">
            <span>📖</span>
        </div>
        <h1 class="promo-title">가장 스마트한 영단어장<br><span>LAGO VOCA</span></h1>
        <p class="promo-desc">
            실시간 데이터 동기화와 롤플레잉 스타일의 시스템으로<br>
            지루하지 않고 완벽하게 영단어를 마스터하세요.
        </p>
        <a href="./login.html" class="btn-promo-start">지금 무료로 시작하기 🚀</a>
    </div>

</body>
</html>
